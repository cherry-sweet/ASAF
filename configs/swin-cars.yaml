data:
  img_size: 384
  dataset: cars
  batch_size: 16
#  autoaug: True
  blur: 0.1
#  color: 0.4  # 0.2
#  hue: 0.4  # 0.4
#  rotate: 15
#  mixup: 0.4
#  cutmix: 0.4
#  no_crop: True  本来就没有
parameters:
  parts_ratio: 2
  num_heads: 32
  att_drop: 0.1
  head_drop: 0.2
  parts_drop: 0.4
  fwp: True
  pos: True
  cross_layer: True
  parts_base: 0.
model:
  type: swin
  name: Swin Base
  baseline_model: True
  drop_path: 0.2
  label_smooth: 0.1
train:
  lr:  5e-03  # 5e-02 5e-3  #8e-04
  epochs: 50
  warmup_epochs: 5
  clip_grad: None
  optimizer: AdamW